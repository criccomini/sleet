name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Debug info bloats the target dir and slows linking; tests don't need it.
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      # Every test target must be run by a job below; a new tests/*.rs
      # or tests/*/main.rs that no job names fails here instead of
      # silently not running.
      - name: check this workflow runs every test target
        run: |
          for f in tests/*.rs tests/*/main.rs; do
            [ -e "$f" ] || continue
            t=$(basename "$f" .rs)
            if [ "$t" = main ]; then t=$(basename "$(dirname "$f")"); fi
            grep -qE -- "--test $t( |$)" .github/workflows/ci.yml \
              || { echo "test target $t is not run by any CI job" >&2; exit 1; }
          done

  # One job per test type; fail-fast off so one failing type still
  # reports the others.
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            args: --lib --bins
          - name: doc
            args: --doc
          - name: props
            args: --test props
          - name: integration
            args: >-
              --test fleet --test cluster --test config --test cli
              --test schemas --test schema_sync --test corpus
          - name: mirror
            args: --test mirror
          - name: chaos
            args: --test chaos
          - name: dst
            args: --test dst
          - name: system
            args: --test system
          - name: perf
            args: --test perf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - run: cargo test --locked ${{ matrix.args }}

  # Model checking plus model-based testing: fizz verifies the
  # coordination spec, then explores the derived MBT spec;
  # fizzbee-mbt-server serves that state space, and the mbt test
  # (tests/mbt) drives its action sequences against the real decision
  # code, comparing every action's return with the model's. With
  # SLEET_MBT set, missing tools fail the test instead of skipping it.
  mbt:
    name: test (mbt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      # Both tarballs wrap their contents in a versioned top-level
      # directory; strip it so the binaries land where the steps below
      # expect them.
      - name: Install fizzbee and fizzbee-mbt
        run: |
          mkdir -p "$HOME/fizzbee" "$HOME/fizzbee-mbt"
          curl -sSfL https://github.com/fizzbee-io/fizzbee/releases/download/v0.5.1/fizzbee-v0.5.1-linux_x86.tar.gz \
            | tar xz --strip-components=1 -C "$HOME/fizzbee"
          curl -sSfL https://github.com/fizzbee-io/fizzbee-mbt-releases/releases/download/v0.2.0/fizzbee-mbt-0.2.0-linux_x86.tar.gz \
            | tar xz --strip-components=1 -C "$HOME/fizzbee-mbt"
          echo "$HOME/fizzbee-mbt" >> "$GITHUB_PATH"
      - name: Model-check the spec and generate MBT states
        run: |
          export PARSER_BIN="$HOME/fizzbee/parser/parser_bin"
          export FIZZBEE_BIN="$HOME/fizzbee/fizzbee"
          "$HOME/fizzbee/fizz" --experimental_no_state_returns specs/coordination.fizz
          "$HOME/fizzbee/fizz" specs/coordination-mbt.fizz
      - name: Serve the state space
        run: |
          "$HOME/fizzbee-mbt/fizzbee-mbt-server" --states_file specs/out/latest &
          for _ in $(seq 60); do
            (exec 3<>/dev/tcp/127.0.0.1/50051) 2>/dev/null && exit 0
            sleep 1
          done
          echo "mbt server never became ready" >&2
          exit 1
      - run: cargo test --locked --test mbt
        env:
          SLEET_MBT: 1

  # Model-check the mirror sync protocol (specs/mirror.fizz) in its
  # two exhaustive configurations (the full budget product does not
  # fit in memory; see the spec header), then spot-check the full
  # product with random simulation. A separate job because the
  # exhaustive runs dominate wall-clock.
  mirror-spec:
    name: model-check (mirror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fizzbee
        run: |
          mkdir -p "$HOME/fizzbee"
          curl -sSfL https://github.com/fizzbee-io/fizzbee/releases/download/v0.5.1/fizzbee-v0.5.1-linux_x86.tar.gz \
            | tar xz --strip-components=1 -C "$HOME/fizzbee"
      - name: Model-check the mirror spec
        run: |
          export PARSER_BIN="$HOME/fizzbee/parser/parser_bin"
          export FIZZBEE_BIN="$HOME/fizzbee/fizzbee"
          "$HOME/fizzbee/fizz" --experimental_processed_queue \
            specs/mirror.fizz | tee /tmp/mirror-a.log
          grep -q "PASSED" /tmp/mirror-a.log
          "$HOME/fizzbee/fizz" --experimental_processed_queue \
            --preinit-hook-file specs/mirror-expiry.cfg \
            specs/mirror.fizz | tee /tmp/mirror-b.log
          grep -q "PASSED" /tmp/mirror-b.log
          for seed in $(seq 1 25); do
            out=$("$HOME/fizzbee/fizz" -x --max_runs 1 --seed "$seed" \
              --output-dir "/tmp/mirror-sim-$seed" \
              --preinit-hook-file specs/mirror-sim.cfg specs/mirror.fizz) \
              || { echo "simulation seed $seed crashed" >&2; exit 1; }
            echo "$out" | grep -qE "FAILED" \
              && { echo "simulation seed $seed failed" >&2; exit 1; }
          done
          echo "simulation sweep clean"

  # The S3 semantics test, against a MinIO service container. The
  # official minio/minio image needs a `server /data` command, which
  # service containers cannot pass; the Bitnami build starts from env
  # alone and pre-creates the bucket. bitnamilegacy is frozen, hence
  # the digest pin. The test itself absorbs startup lag (a 30s
  # readiness loop) and fails, rather than skips, when MinIO is
  # unreachable with SLEET_S3_ENDPOINT set.
  minio:
    name: test (minio)
    runs-on: ubuntu-latest
    services:
      minio:
        image: bitnamilegacy/minio@sha256:451fe6858cb770cc9d0e77ba811ce287420f781c7c1b806a386f6896471a349c
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: sleet
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - run: cargo test --locked --test s3
        env:
          SLEET_S3_ENDPOINT: http://127.0.0.1:9000
