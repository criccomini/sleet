name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Debug info bloats the target dir and slows linking; tests don't need it.
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      # Every test target must be run by a job below; a new tests/*.rs
      # or tests/*/main.rs that no job names fails here instead of
      # silently not running.
      - name: check this workflow runs every test target
        run: |
          for f in tests/*.rs tests/*/main.rs; do
            [ -e "$f" ] || continue
            t=$(basename "$f" .rs)
            if [ "$t" = main ]; then t=$(basename "$(dirname "$f")"); fi
            grep -qE -- "--test $t( |$)" .github/workflows/ci.yml \
              || { echo "test target $t is not run by any CI job" >&2; exit 1; }
          done

  # One job per test type; fail-fast off so one failing type still
  # reports the others.
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            args: --lib --bins
          - name: doc
            args: --doc
          - name: props
            args: --test props
          - name: integration
            args: >-
              --test fleet --test cluster --test config --test cli
              --test schemas --test schema_sync --test corpus
          - name: mirror
            args: --test mirror
          - name: chaos
            args: --test chaos
          - name: dst
            args: --test dst
          - name: system
            args: --test system
          - name: perf
            args: --test perf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - run: cargo test --locked ${{ matrix.args }}

  # Model-based testing: fizz explores the derived MBT specs;
  # fizzbee-mbt-server serves each state space, and the mbt tests
  # (tests/mbt) drive its action sequences against the real decision
  # code, comparing every action's return with the model's. With
  # SLEET_MBT set, missing tools fail the test instead of skipping it.
  # Model checking the specs themselves is a local step, run when a
  # spec changes (see CLAUDE.md); CI runs only the MBT replay.
  mbt:
    name: test (mbt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      # Both tarballs wrap their contents in a versioned top-level
      # directory; strip it so the binaries land where the steps below
      # expect them.
      - name: Install fizzbee and fizzbee-mbt
        run: |
          mkdir -p "$HOME/fizzbee" "$HOME/fizzbee-mbt"
          curl -sSfL https://github.com/fizzbee-io/fizzbee/releases/download/v0.5.1/fizzbee-v0.5.1-linux_x86.tar.gz \
            | tar xz --strip-components=1 -C "$HOME/fizzbee"
          curl -sSfL https://github.com/fizzbee-io/fizzbee-mbt-releases/releases/download/v0.2.0/fizzbee-mbt-0.2.0-linux_x86.tar.gz \
            | tar xz --strip-components=1 -C "$HOME/fizzbee-mbt"
          echo "$HOME/fizzbee-mbt" >> "$GITHUB_PATH"
      - name: Generate MBT states
        run: |
          export PARSER_BIN="$HOME/fizzbee/parser/parser_bin"
          export FIZZBEE_BIN="$HOME/fizzbee/fizzbee"
          "$HOME/fizzbee/fizz" specs/coordination-mbt.fizz
      - name: Serve the state space
        run: |
          "$HOME/fizzbee-mbt/fizzbee-mbt-server" --states_file specs/out/latest &
          for _ in $(seq 60); do
            (exec 3<>/dev/tcp/127.0.0.1/50051) 2>/dev/null && exit 0
            sleep 1
          done
          echo "mbt server never became ready" >&2
          exit 1
      - run: cargo test --locked --test mbt
        env:
          SLEET_MBT: 1
      # The mirror MBT (specs/mirror-mbt.fizz, hand-written at
      # whole-pass granularity; see its header) needs its own state
      # space: re-explore, restart the server, run the mirror-gated
      # test.
      - name: Serve the mirror state space
        run: |
          pkill -f fizzbee-mbt-server || true
          sleep 2
          export PARSER_BIN="$HOME/fizzbee/parser/parser_bin"
          export FIZZBEE_BIN="$HOME/fizzbee/fizzbee"
          "$HOME/fizzbee/fizz" specs/mirror-mbt.fizz
          "$HOME/fizzbee-mbt/fizzbee-mbt-server" --states_file specs/out/latest &
          for _ in $(seq 60); do
            (exec 3<>/dev/tcp/127.0.0.1/50051) 2>/dev/null && exit 0
            sleep 1
          done
          echo "mbt server never became ready" >&2
          exit 1
      - run: cargo test --locked --test mbt mirror
        env:
          SLEET_MBT_MIRROR: 1

  # The GCS semantics test and the cross-store (S3 -> GCS) mirror
  # test, against fake-gcs-server plus the same MinIO container the
  # s3 job uses. fake-gcs-server needs command-line flags (-scheme
  # http), which service containers cannot pass, so a step runs the
  # container directly. The test creates its bucket itself and
  # absorbs startup lag; with the endpoints set, unreachable servers
  # fail rather than skip.
  gcs:
    name: test (gcs)
    runs-on: ubuntu-latest
    services:
      minio:
        image: bitnamilegacy/minio@sha256:451fe6858cb770cc9d0e77ba811ce287420f781c7c1b806a386f6896471a349c
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: sleet
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      # The tustvold fork: upstream fsouza/fake-gcs-server rejects
      # object_store's XML-API uploads with "invalid uploadType".
      # The same fork object_store's own CI tests against.
      - name: Run fake-gcs-server
        run: |
          docker run -d --name fake-gcs -p 4443:4443 \
            tustvold/fake-gcs-server \
            -scheme http -backend memory -public-host 127.0.0.1:4443
      - run: cargo test --locked --test gcs
        env:
          SLEET_GCS_ENDPOINT: http://127.0.0.1:4443
          SLEET_S3_ENDPOINT: http://127.0.0.1:9000

  # The S3 semantics test, against a MinIO service container. The
  # official minio/minio image needs a `server /data` command, which
  # service containers cannot pass; the Bitnami build starts from env
  # alone and pre-creates the bucket. bitnamilegacy is frozen, hence
  # the digest pin. The test itself absorbs startup lag (a 30s
  # readiness loop) and fails, rather than skips, when MinIO is
  # unreachable with SLEET_S3_ENDPOINT set.
  minio:
    name: test (minio)
    runs-on: ubuntu-latest
    services:
      minio:
        image: bitnamilegacy/minio@sha256:451fe6858cb770cc9d0e77ba811ce287420f781c7c1b806a386f6896471a349c
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: sleet
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - run: cargo test --locked --test s3
        env:
          SLEET_S3_ENDPOINT: http://127.0.0.1:9000
