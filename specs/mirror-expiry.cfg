# The expiry configuration for specs/mirror.fizz (see its header):
# pin expiry, pass restarts, and prune orphan reclaim, with operator
# checkpoints off to keep the state space in memory.
# Run: fizz --experimental_processed_queue \
#   --preinit-hook-file specs/mirror-expiry.cfg specs/mirror.fizz
EXPIRIES = 1
OP_CREATES = 0
OP_DELETES = 0
